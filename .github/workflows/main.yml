name: Minecraft Bot 24/7 (Auto-Pilot)

on:
  push:
    branches: [ main ] # يشتغل فوراً أول ما تضغط "Commit"
  workflow_dispatch: # تقدر تشغله يدوي لو احتجت
  schedule:
    - cron: '0 */3 * * *' # يفتح خانة جديدة كل 3 ساعات أوتوماتيكياً

concurrency:
  group: bot-refresh-v2 # تحديث الجروب لضمان عدم التداخل
  cancel-in-progress: true # يقفل القديم ويفتح الجديد فوراً

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Bot
        run: node index.js
        timeout-minutes: 175 # نخليه يطفي قبل الـ 3 ساعات بـ 5 دقايق عشان الجديد يفتح مكانه بنظام
