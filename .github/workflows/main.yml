name: Minecraft Bot 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

concurrency:
  group: bot-refresh-v1 # غيرنا الاسم هنا للتحديث
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # تأكد إنها كذا
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Bot
        run: node index.js
        timeout-minutes: 350
