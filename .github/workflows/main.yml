name: Minecraft Bot 24/7 (Handover Edition)

on:
  push:
    branches: [ main ]
  workflow_dispatch: 
  schedule:
    - cron: '0 */3 * * *' # يشتغل كل 3 ساعات أوتوماتيكياً

concurrency:
  group: bot-refresh-v2
  # خليه false عشان يسمح للجديد يدخل والقديم لسه موجود (Overlap)
  cancel-in-progress: false 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Bot & Handover
        run: |
          # 1. تشغيل البوت الجديد في الخلفية
          node index.js &
          
          # 2. انتظار 30 ثانية فقط (وقت كافي لربط الاتصال وتثبيت البوت في السيرفر)
          echo "Handover in progress... New bot joining."
          sleep 30
          
          # 3. إعلان نجاح العملية
          echo "Handover complete! New bot is now guarding the server."
          
          # 4. إبقاء الأكشن شغال لمدة 175 دقيقة (ليغطي الـ 3 ساعات)
          # 10500 ثانية = 175 دقيقة
          sleep 10500
        
        # نضبط وقت انتهاء الأكشن ليكون 179 دقيقة (قبل الدورة الجديدة بدقيقة)
        timeout-minutes: 179
