name: Minecraft Bot 24/7

on:
  workflow_dispatch: # تشغيل يدوي
  schedule:
    - cron: '0 * * * *' # تشغيل تلقائي كل ساعة

# --- الحل السحري لتضارب البوتات هنا ---
concurrency:
  group: minecraft-bot-group
  cancel-in-progress: true
# -----------------------------------

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: uses/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Bot
        run: node index.js
        timeout-minutes: 350
